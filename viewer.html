<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CartoFLU — Vue en direct</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',Arial,sans-serif; background:#0d1117; color:#e6edf3; height:100vh; display:flex; flex-direction:column; }

  /* BANDEAU */
  #header {
    display:flex; align-items:center; gap:10px;
    padding:8px 14px; background:#161b22;
    border-bottom:1px solid #30363d; flex-shrink:0; flex-wrap:wrap;
  }
  #header .logo { font-size:18px; font-weight:700; color:#58a6ff; letter-spacing:1px; }
  #header .logo span { color:#f78166; }
  #header .subtitle { font-size:12px; color:#8b949e; }
  #header .sep { flex:1; }

  #statusBadge {
    display:flex; align-items:center; gap:6px;
    font-size:12px; font-family:monospace;
    padding:4px 10px; border-radius:20px;
    border:1px solid #30363d; background:#0d1117;
    color:#8b949e;
  }
  #statusDot { width:8px; height:8px; border-radius:50%; background:#8b949e; flex-shrink:0; }
  #statusDot.ok { background:#3fb950; }
  #statusDot.warn { background:#f85149; }

  #basemapSelect {
    background:#0d1117; border:1px solid #30363d; border-radius:6px;
    color:#e6edf3; font-size:12px; padding:4px 8px; cursor:pointer;
  }

  #lastUpdate { font-size:11px; color:#8b949e; font-family:monospace; }

  /* CARTE */
  #map { flex:1; }

  /* LÉGENDE */
  #legend {
    position:absolute; bottom:30px; right:10px; z-index:1000;
    background:rgba(13,17,23,0.88); border:1px solid #30363d;
    border-radius:8px; padding:10px 14px; font-size:12px;
    min-width:160px;
  }
  #legend .leg-title { font-weight:700; color:#58a6ff; margin-bottom:8px; font-size:13px; }
  .leg-item { display:flex; align-items:center; gap:8px; margin:4px 0; }
  .leg-line { width:24px; height:3px; border-radius:2px; }
  .leg-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

  /* INFOS CONNEXION */
  #connectBar {
    display:flex; align-items:center; gap:10px;
    padding:10px 14px; background:#161b22;
    border-bottom:1px solid #30363d; flex-shrink:0;
  }
  #connectBar input {
    flex:1; background:#0d1117; border:1px solid #30363d; border-radius:6px;
    color:#e6edf3; font-size:13px; font-family:monospace; padding:6px 10px;
    text-transform:uppercase; letter-spacing:1px;
  }
  #connectBar input:focus { outline:none; border-color:#58a6ff; }
  #connectBar button {
    background:#238636; color:#fff; border:none; border-radius:6px;
    padding:6px 16px; font-size:13px; font-weight:600; cursor:pointer;
  }
  #connectBar button:hover { background:#2ea043; }
  #connectBar .hint { font-size:11px; color:#8b949e; }

  /* COORD BAR */
  #coordBar {
    background:#0d1117; border-top:1px solid #30363d;
    padding:5px 14px; font-family:'Share Tech Mono',monospace;
    font-size:15px; display:flex; gap:16px; align-items:center;
    flex-shrink:0; flex-wrap:wrap; color:#8b949e; min-height:32px;
  }
  #coordBar span { color:#e6edf3; }
  #coordBar .lbl { font-size:10px; color:#58a6ff; letter-spacing:1px; margin-right:4px; }
  #coordBar .waiting { color:#444; font-style:italic; }

  /* POPUP OVERRIDES */
  .leaflet-popup-content-wrapper {
    background:#161b22; color:#e6edf3; border:1px solid #30363d;
    border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,0.5);
  }
  .leaflet-popup-tip { background:#161b22; }
  .popup-title { font-weight:700; font-size:14px; margin-bottom:4px; }
  .popup-meta { font-size:12px; color:#8b949e; font-family:monospace; }
</style>
</head>
<body>

<div id="header">
  <div class="logo">Carto<span>FLU</span></div>
  <div class="subtitle">Vue observateur — ADRASEC 25</div>
  <div class="sep"></div>
  <select id="basemapSelect" onchange="changeBasemap(this.value)" title="Changer le fond de carte">
    <option value="osm">🗺 OSM Standard</option>
    <option value="topo">⛰ OpenTopoMap</option>
    <option value="satellite">🛰 Satellite Esri</option>
    <option value="osmfr">🇫🇷 OSM France</option>
    <option value="cycle">🚴 CyclOSM</option>
  </select>
  <div id="lastUpdate"></div>
  <div id="statusBadge"><div id="statusDot"></div><span id="statusText">Non connecté</span></div>
</div>

<div id="connectBar">
  <span class="hint">ID coordinateur :</span>
  <input type="text" id="peerIdInput" placeholder="CFU-XXXXXX" maxlength="12"/>
  <button onclick="connect()">🔗 Rejoindre</button>
  <span class="hint" id="connectHint">Saisissez l'ID transmis par le coordinateur</span>
</div>

<div id="map"></div>

<div id="legend">
  <div class="leg-title">Légende</div>
  <div class="leg-item"><div class="leg-line" style="background:#00d4ff"></div><span>Axe de relèvement</span></div>
  <div class="leg-item"><div class="leg-line" style="background:#00d4ff;opacity:0.3;height:8px;"></div><span>Secteur incertitude</span></div>
  <div class="leg-item"><div class="leg-dot" style="background:#00d4ff"></div><span>Station réceptrice</span></div>
  <div class="leg-item"><div class="leg-dot" style="background:#ff2d55"></div><span>Intersection estimée</span></div>
  <div class="leg-item"><div class="leg-dot" style="background:#ff2d55;border-radius:0"></div><span>Position balise (fox)</span></div>
  <div class="leg-item"><span style="font-size:14px">🚫</span><span>Écoute négative</span></div>
</div>

<div id="coordBar"><span class="waiting">Déplacez la souris sur la carte…</span></div>

<script>
// ── CARTE ──────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([47.2, 6.0], 8);

const BASEMAPS = {
  osm:       { url:'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png', attr:'© OpenStreetMap, © CARTO', maxZoom:19 },
  topo:      { url:'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', attr:'© OpenTopoMap', maxZoom:17 },
  satellite: { url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', attr:'© Esri', maxZoom:19 },
  osmfr:     { url:'https://{s}.tile.openstreetmap.fr/osmfr/{z}/{x}/{y}.png', attr:'© OpenStreetMap France', maxZoom:20 },
  cycle:     { url:'https://{s}.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png', attr:'© CyclOSM', maxZoom:20 },
};

let currentTile = L.tileLayer(BASEMAPS.osm.url, { attribution: BASEMAPS.osm.attr, maxZoom: 19 }).addTo(map);

function changeBasemap(key) {
  const bm = BASEMAPS[key] || BASEMAPS.osm;
  map.removeLayer(currentTile);
  currentTile = L.tileLayer(bm.url, { attribution: bm.attr, maxZoom: bm.maxZoom }).addTo(map);
  currentTile.bringToBack();
  localStorage.setItem('viewer_basemap', key);
}

// Restaure le fond mémorisé
const savedBm = localStorage.getItem('viewer_basemap');
if (savedBm && BASEMAPS[savedBm]) {
  document.getElementById('basemapSelect').value = savedBm;
  changeBasemap(savedBm);
}

// ── LAYERS ─────────────────────────────────────────────────────────────────
let layers = {};
let intersectionMarker = null;
let balisMarker = null;
let volLayers = [];
let zoneLayers = [];
let sendMarkerLayers = [];
let negMarkers = [];

function clearAll() {
  Object.values(layers).forEach(l => { if(Array.isArray(l)) l.forEach(x=>map.removeLayer(x)); else map.removeLayer(l); });
  layers = {};
  if (intersectionMarker) { map.removeLayer(intersectionMarker); intersectionMarker = null; }
  if (balisMarker) { map.removeLayer(balisMarker); balisMarker = null; }
  volLayers.forEach(l => map.removeLayer(l)); volLayers = [];
  zoneLayers.forEach(l => map.removeLayer(l)); zoneLayers = [];
  sendMarkerLayers.forEach(l => map.removeLayer(l)); sendMarkerLayers = [];
  negMarkers.forEach(l => map.removeLayer(l)); negMarkers = [];
}

function applySession(d) {
  clearAll();

  // Relevés
  (d.bearings || []).forEach(b => {
    const color = b.color || '#00d4ff';
    const rad = b.bearing * Math.PI / 180;
    const len = (b.lineLength || 100) * 1000;
    const R = 6371000;
    const lat2 = Math.asin(Math.sin(b.lat*Math.PI/180)*Math.cos(len/R) + Math.cos(b.lat*Math.PI/180)*Math.sin(len/R)*Math.cos(rad));
    const lon2 = b.lon*Math.PI/180 + Math.atan2(Math.sin(rad)*Math.sin(len/R)*Math.cos(b.lat*Math.PI/180), Math.cos(len/R)-Math.sin(b.lat*Math.PI/180)*Math.sin(lat2));
    const endLat = lat2*180/Math.PI, endLon = lon2*180/Math.PI;

    const line = L.polyline([[b.lat,b.lon],[endLat,endLon]], { color, weight:2, opacity:0.9 });
    const stIcon = L.divIcon({
      html: `<div style="position:relative;width:0;height:0;overflow:visible;">
        <div style="position:absolute;width:12px;height:12px;border-radius:50%;background:${color};border:2px solid #0a0e14;box-shadow:0 0 10px ${color};transform:translate(-6px,-6px);"></div>
        <div style="position:absolute;left:10px;top:-12px;font-family:'Share Tech Mono',monospace;font-size:20px;font-weight:700;letter-spacing:2px;color:${color};text-shadow:-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000;white-space:nowrap;pointer-events:none;">${b.callsign} <span style="font-size:14px;opacity:0.7">#${b.id}</span></div>
      </div>`,
      iconSize:[0,0], iconAnchor:[0,0], className:''
    });
    const dot = L.marker([b.lat,b.lon], { icon: stIcon });

    const popup = `<div class="popup-title" style="color:${color}">${b.callsign} #${b.id}</div>
      <div class="popup-meta">Az : ${b.bearing}° ± ${b.uncertainty||0}°<br>
      Lat : ${b.lat.toFixed(5)}<br>Lon : ${b.lon.toFixed(5)}<br>
      ${b.timestamp ? b.timestamp.replace('T',' ') : ''}</div>`;

    line.bindPopup(popup); dot.bindPopup(popup);
    line.addTo(map); dot.addTo(map);
    layers[b.id] = [line, dot];

    // Secteur incertitude
    if (b.uncertainty > 0) {
      const sect = L.polygon(buildSector(b.lat, b.lon, b.bearing, b.uncertainty, b.lineLength||100), {
        color, fillColor:color, fillOpacity:0.08, weight:1, opacity:0.4
      }).addTo(map);
      layers[b.id].push(sect);
    }
  });

  // Intersection
  if (d.intersection) {
    const icon = L.divIcon({ html:`<div style="width:16px;height:16px;border:2px solid #ff2d55;border-radius:50%;background:rgba(255,45,85,0.3);position:relative"><div style="position:absolute;top:50%;left:50%;width:4px;height:4px;background:#ff2d55;border-radius:50%;transform:translate(-50%,-50%)"></div></div>`, className:'', iconAnchor:[8,8] });
    intersectionMarker = L.marker([d.intersection.lat, d.intersection.lon], { icon })
      .bindPopup(`<div class="popup-title" style="color:#ff2d55">⊕ Intersection estimée</div><div class="popup-meta">Lat : ${d.intersection.lat.toFixed(5)}<br>Lon : ${d.intersection.lon.toFixed(5)}<br>RMS : ${d.intersection.rms ? d.intersection.rms.toFixed(1)+'°' : '–'}</div>`)
      .addTo(map);
  }

  // Balise
  if (d.balise) {
    const bIcon = L.divIcon({ html:`<svg width="24" height="24" viewBox="0 0 24 24"><line x1="12" y1="0" x2="12" y2="24" stroke="#ff2d55" stroke-width="3"/><line x1="0" y1="12" x2="24" y2="12" stroke="#ff2d55" stroke-width="3"/></svg>`, className:'', iconAnchor:[12,12] });
    balisMarker = L.marker([d.balise.lat, d.balise.lon], { icon: bIcon })
      .bindPopup(`<div class="popup-title" style="color:#ff2d55">✚ BALISE — Position fox</div><div class="popup-meta">Lat : ${d.balise.lat.toFixed(5)}<br>Lon : ${d.balise.lon.toFixed(5)}</div>`)
      .addTo(map);
  }

  // Écoutes négatives
  (d.negListenings || []).forEach(n => {
    const color = n.color || '#ff2d55';
    const svgEar = `<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="48" fill="rgba(20,0,0,0.82)" stroke="${color}" stroke-width="2"/>
      <g stroke="#ff2d55" stroke-width="5.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M62 22 C75 22 82 33 82 46 C82 58 76 65 68 72 C64 76 62 80 62 84 C62 86 60 88 57 88 C53 88 51 85 51 82"/>
        <path d="M51 62 C54 58 60 54 60 46 C60 38 54 32 47 32 C40 32 35 38 35 46 C35 52 39 57 44 60"/>
        <circle cx="47" cy="72" r="3.5" fill="#ff2d55" stroke="none"/>
        <path d="M35 46 C35 68 42 80 51 82"/>
      </g>
      <line x1="18" y1="18" x2="82" y2="82" stroke="#ff2d55" stroke-width="6" stroke-linecap="round"/>
    </svg>`;
    const icon = L.divIcon({
      html: `<div style="position:relative;width:0;height:0;overflow:visible;">
        ${svgEar}
        <div style="position:absolute;left:38px;top:-12px;font-family:'Share Tech Mono',monospace;font-size:20px;font-weight:700;letter-spacing:2px;color:${color};text-shadow:-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000;white-space:nowrap;pointer-events:none;">${n.callsign}</div>
      </div>`,
      iconSize:[0,0], iconAnchor:[20,20], className:''
    });
    const m = L.marker([n.lat, n.lon], { icon })
      .bindPopup(`<div class="popup-title" style="color:#ff2d55">🚫 ${n.callsign}</div><div class="popup-meta">Écoute négative<br>Lat : ${n.lat.toFixed(5)}<br>Lon : ${n.lon.toFixed(5)}<br>${n.timestamp ? n.timestamp.replace('T',' ') : ''}</div>`)
      .addTo(map);
    negMarkers.push(m);
  });

  // Marqueurs "Envoyer une station ici"
  (d.sendMarkers || []).forEach(sm => {
    const color = sm.color || '#00d4ff';
    const icon = L.divIcon({
      html:`<div style="position:relative;width:0;height:0;overflow:visible;">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 28 28">
          <polygon points="28,14 8,4 12,14 8,24" fill="${color}" stroke="#0a0e14" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        <div style="position:absolute;left:30px;top:-4px;font-family:'Share Tech Mono',monospace;font-size:18px;font-weight:700;letter-spacing:2px;color:${color};text-shadow:-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,1px 1px 0 #000;white-space:nowrap;pointer-events:none;">${sm.callsign}</div>
      </div>`,
      iconSize:[0,0], iconAnchor:[0,14], className:''
    });
    const m = L.marker([sm.lat, sm.lon], { icon })
      .bindPopup(`<div class="popup-title" style="color:${color}">➤ ${sm.callsign}</div><div class="popup-meta">Lat : ${sm.lat.toFixed(5)}<br>Lon : ${sm.lon.toFixed(5)}</div>`)
      .addTo(map);
    sendMarkerLayers.push(m);
  });

  // Couloir de vol
  if (d.vol && d.vol.depart && d.vol.dest) {
    const dep = L.latLng(d.vol.depart.a, d.vol.depart.o);
    const dst = L.latLng(d.vol.dest.a, d.vol.dest.o);
    const color = d.vol.color || '#00d4ff';
    const wkm = d.vol.widthKm || 20;
    const line = L.polyline([dep,dst], { color, weight:2, dashArray:'8 4', opacity:0.9 }).addTo(map);
    volLayers.push(line);
    const corridor = buildCorridor(dep, dst, wkm);
    const poly = L.polygon(corridor, { color, fillColor:color, fillOpacity:0.12, weight:1, opacity:0.5 }).addTo(map);
    volLayers.push(poly);
    const mkIcon = (txt, c) => L.divIcon({ html:`<div style="background:${c};color:#000;font-family:monospace;font-size:10px;font-weight:700;padding:2px 5px;border-radius:3px;white-space:nowrap">${txt}</div>`, className:'', iconAnchor:[0,10] });
    volLayers.push(L.marker(dep, { icon: mkIcon('✈ '+d.vol.depart.i, color) }).addTo(map));
    volLayers.push(L.marker(dst, { icon: mkIcon(d.vol.dest.i+' ✈', color) }).addTo(map));
  }

  // Zone de recherche
  if (d.zone && d.zone.points && d.zone.points.length >= 3) {
    const color = d.zone.color || '#ff6b35';
    const pts = d.zone.points.map(p => L.latLng(p.lat, p.lng));
    const poly = L.polygon(pts, { color, fillColor:color, fillOpacity:0.15, weight:2, opacity:0.9 }).addTo(map);
    zoneLayers.push(poly);
    pts.forEach(pt => {
      const dot = L.circleMarker(pt, { radius:4, color, fillColor:color, fillOpacity:1, weight:1.5 }).addTo(map);
      zoneLayers.push(dot);
    });
  }

  // Mise à jour statut
  const now = new Date();
  document.getElementById('lastUpdate').textContent = 'Mis à jour : ' + now.toLocaleTimeString();
}

// ── GÉOMÉTRIE ──────────────────────────────────────────────────────────────
function buildSector(lat, lon, bearing, uncertainty, lenKm) {
  const pts = [];
  const R = 6371, d = (lenKm||100)/R;
  for (let a = bearing-uncertainty; a <= bearing+uncertainty; a += 2) {
    const rad = a*Math.PI/180;
    const lat2 = Math.asin(Math.sin(lat*Math.PI/180)*Math.cos(d)+Math.cos(lat*Math.PI/180)*Math.sin(d)*Math.cos(rad));
    const lon2 = lon*Math.PI/180+Math.atan2(Math.sin(rad)*Math.sin(d)*Math.cos(lat*Math.PI/180),Math.cos(d)-Math.sin(lat*Math.PI/180)*Math.sin(lat2));
    pts.push([lat2*180/Math.PI, lon2*180/Math.PI]);
  }
  pts.unshift([lat,lon]); pts.push([lat,lon]);
  return pts;
}

function buildCorridor(dep, dst, widthKm) {
  const bearing = calcBearing(dep.lat, dep.lng, dst.lat, dst.lng);
  const d = widthKm/6371;
  const perp1 = bearing - Math.PI/2, perp2 = bearing + Math.PI/2;
  const off = (ll, angle) => {
    const lat1=ll.lat*Math.PI/180, lon1=ll.lng*Math.PI/180;
    const lat2=Math.asin(Math.sin(lat1)*Math.cos(d)+Math.cos(lat1)*Math.sin(d)*Math.cos(angle));
    const lon2=lon1+Math.atan2(Math.sin(angle)*Math.sin(d)*Math.cos(lat1),Math.cos(d)-Math.sin(lat1)*Math.sin(lat2));
    return L.latLng(lat2*180/Math.PI, lon2*180/Math.PI);
  };
  return [off(dep,perp1), off(dst,perp1), off(dst,perp2), off(dep,perp2)];
}

function calcBearing(lat1, lon1, lat2, lon2) {
  const dLon=(lon2-lon1)*Math.PI/180, f1=lat1*Math.PI/180, f2=lat2*Math.PI/180;
  return Math.atan2(Math.sin(dLon)*Math.cos(f2), Math.cos(f1)*Math.sin(f2)-Math.sin(f1)*Math.cos(f2)*Math.cos(dLon));
}

// ── PEERJS ─────────────────────────────────────────────────────────────────
let peer = null;
let conn = null;

function setStatus(text, state) {
  document.getElementById('statusText').textContent = text;
  const dot = document.getElementById('statusDot');
  dot.className = state === 'ok' ? 'ok' : state === 'warn' ? 'warn' : '';
}

function connect() {
  const remoteId = document.getElementById('peerIdInput').value.trim().toUpperCase();
  if (!remoteId) return;

  if (!peer) {
    peer = new Peer({ debug: 0 });
    peer.on('error', err => setStatus('Erreur : ' + err.type, 'warn'));
  }

  const tryConnect = () => {
    setStatus('Connexion à ' + remoteId + '…', '');
    conn = peer.connect(remoteId, { reliable: true });

    conn.on('open', () => {
      setStatus('Connecté à ' + remoteId, 'ok');
      document.getElementById('connectHint').textContent = '✅ Connexion établie — carte mise à jour en temps réel';
      document.getElementById('connectBar').style.background = 'rgba(35,134,54,0.12)';
    });

    conn.on('data', msg => {
      if (msg.type === 'session') applySession(msg.data);
    });

    conn.on('close', () => {
      setStatus('Déconnecté', 'warn');
      document.getElementById('connectHint').textContent = '⚠ Connexion perdue — réessayez';
      document.getElementById('connectBar').style.background = '';
    });

    conn.on('error', () => setStatus('Erreur de connexion', 'warn'));
  };

  if (peer.open) { tryConnect(); }
  else { peer.on('open', tryConnect); }
}

// Connexion automatique si ?peer= dans l'URL
window.addEventListener('load', () => {
  const params = new URLSearchParams(window.location.search);
  const peerId = params.get('peer');
  if (peerId) {
    document.getElementById('peerIdInput').value = peerId.toUpperCase();
    setTimeout(connect, 800);
  }
});

// Touche Entrée dans le champ ID
document.getElementById('peerIdInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') connect();
});

// ── COORDONNÉES ────────────────────────────────────────────────────────────
function ddToDMS(deg, isLat) {
  const abs = Math.abs(deg);
  const d = Math.floor(abs);
  const mFull = (abs - d) * 60;
  const m = Math.floor(mFull);
  const s = Math.round((mFull - m) * 60);
  const dir = isLat ? (deg >= 0 ? 'N' : 'S') : (deg >= 0 ? 'E' : 'W');
  return `${d}° ${String(m).padStart(2,'0')}′ ${String(s).padStart(2,'0')}″ ${dir}`;
}

function ddToUTM(lat, lon) {
  const k0=0.9996,a=6378137.0,e=0.0818191908426;
  const e2=e*e,e4=e2*e2,e6=e4*e2;
  const latR=lat*Math.PI/180,lonR=lon*Math.PI/180;
  const zone=Math.floor((lon+180)/6)+1;
  const lonOriginR=((zone-1)*6-180+3)*Math.PI/180;
  const eccPrime2=e2/(1-e2);
  const N=a/Math.sqrt(1-e2*Math.sin(latR)**2);
  const T=Math.tan(latR)**2,C=eccPrime2*Math.cos(latR)**2,A=Math.cos(latR)*(lonR-lonOriginR);
  const M=a*((1-e2/4-3*e4/64-5*e6/256)*latR-(3*e2/8+3*e4/32+45*e6/1024)*Math.sin(2*latR)+(15*e4/256+45*e6/1024)*Math.sin(4*latR)-(35*e6/3072)*Math.sin(6*latR));
  const easting=Math.round(k0*N*(A+(1-T+C)*A**3/6+(5-18*T+T**2+72*C-58*eccPrime2)*A**5/120)+500000);
  const northing=Math.round(k0*(M+N*Math.tan(latR)*(A**2/2+(5-T+9*C+4*C**2)*A**4/24+(61-58*T+T**2+600*C-330*eccPrime2)*A**6/720))+(lat<0?10000000:0));
  const band='CDEFGHJKLMNPQRSTUVWXX'[Math.floor((lat+80)/8)]||'Z';
  return `${zone}${band} ${easting}E ${northing}N`;
}

function ddToMGRS(lat, lon) {
  const k0=0.9996,a=6378137.0,e=0.0818191908426;
  const e2=e*e,e4=e2*e2,e6=e4*e2;
  const latR=lat*Math.PI/180,lonR=lon*Math.PI/180;
  const zone=Math.floor((lon+180)/6)+1;
  const lonOriginR=((zone-1)*6-180+3)*Math.PI/180;
  const eccPrime2=e2/(1-e2);
  const N2=a/Math.sqrt(1-e2*Math.sin(latR)**2);
  const T2=Math.tan(latR)**2,C2=eccPrime2*Math.cos(latR)**2,A2=Math.cos(latR)*(lonR-lonOriginR);
  const M2=a*((1-e2/4-3*e4/64-5*e6/256)*latR-(3*e2/8+3*e4/32+45*e6/1024)*Math.sin(2*latR)+(15*e4/256+45*e6/1024)*Math.sin(4*latR)-(35*e6/3072)*Math.sin(6*latR));
  const easting=k0*N2*(A2+(1-T2+C2)*A2**3/6+(5-18*T2+T2**2+72*C2-58*eccPrime2)*A2**5/120)+500000;
  const northing=k0*(M2+N2*Math.tan(latR)*(A2**2/2+(5-T2+9*C2+4*C2**2)*A2**4/24+(61-58*T2+T2**2+600*C2-330*eccPrime2)*A2**6/720))+(lat<0?10000000:0);
  const band='CDEFGHJKLMNPQRSTUVWXX'[Math.floor((lat+80)/8)]||'Z';
  const rowLetters='ABCDEFGHJKLMNPQRSTUV';
  const setNum=(zone-1)%6;
  const colSets=['ABCDEFGH','JKLMNPQR','STUVWXYZ','ABCDEFGH','JKLMNPQR','STUVWXYZ'];
  const colLetter=colSets[setNum][Math.floor(easting/100000)-1]||'?';
  const rowOffset=(zone%2===0)?5:0;
  const rowIdx=(Math.floor(northing/100000)+rowOffset)%20;
  const rowLetter=rowLetters[rowIdx]||'?';
  const e5=String(Math.round(easting%100000)).padEnd(5,'0');
  const n5=String(Math.round(northing%100000)).padEnd(5,'0');
  return `${zone}${band} ${colLetter}${rowLetter} ${e5} ${n5}`;
}

map.on('mousemove', e => {
  const lat = e.latlng.lat, lng = e.latlng.lng;
  document.getElementById('coordBar').innerHTML =
    `<span><span class="lbl">DD</span><span>${lat.toFixed(5)}° N  ${lng.toFixed(5)}° E</span></span>` +
    `<span><span class="lbl">DMS</span><span>${ddToDMS(lat,true)}  ${ddToDMS(lng,false)}</span></span>` +
    `<span><span class="lbl">UTM</span><span>${ddToUTM(lat,lng)}</span></span>` +
    `<span><span class="lbl">MGRS</span><span>${ddToMGRS(lat,lng)}</span></span>`;
});

map.on('mouseout', () => {
  document.getElementById('coordBar').innerHTML = '<span class="waiting">Déplacez la souris sur la carte…</span>';
});
</script>
